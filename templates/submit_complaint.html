{% extends "base.html" %}
{% block title %}Submit Message – EduRecommender{% endblock %}
{% block page_title %}New Message{% endblock %}

{% block content %}
<div class="fade-in">
  <div class="card" style="max-width:640px;">
    <h3 class="card-title" style="margin-bottom:4px;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:8px;vertical-align:text-bottom;"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
      Send a Message
    </h3>
    <p style="color:var(--text-secondary);margin-bottom:24px;">Have a complaint, question, or suggestion? We'd love to hear from you.</p>

    <form method="POST" action="{{ url_for('complaints.submit_complaint') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="form-group">
        <label for="subject">Subject</label>
        <input type="text" id="subject" name="subject" class="form-control"
               placeholder="Brief summary of your message" value="{{ subject|default('') }}" required maxlength="200">
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" class="form-control"
                  placeholder="Describe your complaint, question, or suggestion in detail..." required>{{ message|default('') }}</textarea>
      </div>

      <div style="display:flex;gap:12px;">
        <button type="submit" class="btn btn-primary" style="flex:1;justify-content:center;">
          Send Message
        </button>
        <a href="{{ url_for('complaints.my_complaints') }}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
