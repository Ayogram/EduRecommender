{% extends "base.html" %}
{% block title %}Complete Your Profile – EduRecommender{% endblock %}

{% block content %}
<div class="auth-container">
  <div class="auth-card fade-in" style="max-width: 600px;">
    <div class="auth-header">
      <div style="margin-bottom:16px;">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--accent)">
          <path d="M12 11c1.657 0 3-1.343 3-3S13.657 5 12 5 9 6.343 9 8s1.343 3 3 3z"/><path d="M12 13c-2.761 0-5 2.239-5 5v1h10v-1c0-2.761-2.239-5-5-5z"/>
          <circle cx="12" cy="12" r="10"/>
        </svg>
      </div>
      <h1>Almost There!</h1>
      <p>Tell us about your academic background to get the best recommendations.</p>
    </div>

    <form method="POST" id="complete-profile-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <!-- Level 1: Academic Field -->
      <div class="row">
        <div class="col-md-6">
          <div class="form-group">
            <label for="academic_field">Primary Academic Field</label>
            <div class="input-wrapper">
              <i class="fas fa-university"></i>
              <select id="academic_field" name="academic_field" class="form-control" required style="appearance: none; padding-right: 40px;">
                <option value="" disabled selected>Select field...</option>
                {% for field in fields_map.keys() %}
                <option value="{{ field }}">{{ field }}</option>
                {% endfor %}
              </select>
              <i class="fas fa-chevron-down" style="position: absolute; right: 14px; left: auto; color: var(--text-muted);"></i>
            </div>
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-group">
            <label for="department">Department</label>
            <div class="input-wrapper">
              <i class="fas fa-building"></i>
              <input type="text" name="department" class="form-control" placeholder="e.g. Computer Science" required>
            </div>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="gpa">Current Cumulative GPA</label>
        <div class="input-wrapper">
          <i class="fas fa-chart-line"></i>
          <input type="number" name="gpa" class="form-control" step="0.01" min="0" max="5.0" placeholder="e.g. 3.50 (Leave 0.0 if first year)" required>
        </div>
      </div>

      <!-- Level 2: Sub-Interests (Dynamic) -->
      <div class="form-group" id="sub-interests-container" style="display: none;">
        <label>Areas of Interest in <span id="selected-field-name"></span></label>
        <p class="text-muted small mb-2">Select all that apply:</p>
        <div class="interest-grid" id="sub-interests-grid">
          <!-- Populated by JS -->
        </div>
      </div>

      <!-- Level 3: Custom Interests -->
      <div class="form-group">
        <label for="custom_interests">Add Specific Interests</label>
        <div class="input-wrapper">
          <i class="fas fa-tag"></i>
          <input type="text" id="custom-interest-input" class="form-control" placeholder="e.g. Quantum Computing, Civil Law (Press Enter)">
        </div>
        <div id="custom-interests-chips" style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px;"></div>
        <input type="hidden" name="custom_interests" id="custom-interests-hidden">
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:14px;margin-top:20px;">
        Complete Registration
      </button>
    </form>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const fieldSelect = document.getElementById('academic_field');
  const subContainer = document.getElementById('sub-interests-container');
  const fieldNameSpan = document.getElementById('selected-field-name');
  const grid = document.getElementById('sub-interests-grid');
  const customInput = document.getElementById('custom-interest-input');
  const chipsContainer = document.getElementById('custom-interests-chips');
  const hiddenInput = document.getElementById('custom-interests-hidden');
  
  let customInterests = [];

  // 1. Dynamic Sub-Interests
  fieldSelect.addEventListener('change', async function() {
    const field = this.value;
    fieldNameSpan.textContent = field;
    subContainer.style.display = 'block';
    grid.innerHTML = '<p class="text-muted">Loading...</p>';
    
    try {
      const response = await fetch(`/api/sub-interests/${encodeURIComponent(field)}`);
      const data = await response.json();
      
      grid.innerHTML = '';
      data.sub_interests.forEach(interest => {
        const div = document.createElement('div');
        div.className = 'interest-chip';
        div.innerHTML = `
          <input type="checkbox" id="int_${interest.replace(/ /g, '_')}" name="interests" value="${interest}">
          <label for="int_${interest.replace(/ /g, '_')}">${interest}</label>
        `;
        grid.appendChild(div);
      });
    } catch (e) {
      grid.innerHTML = '<p class="text-danger">Failed to load interests.</p>';
    }
  });

  // 2. Custom Interest Chips
  customInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      const val = this.value.trim();
      if (val && !customInterests.includes(val)) {
        addChip(val);
        this.value = '';
      }
    }
  });

  function addChip(val) {
    customInterests.push(val);
    updateHidden();
    
    const chip = document.createElement('div');
    chip.className = 'badge badge-category';
    chip.style.padding = '8px 12px';
    chip.style.display = 'flex';
    chip.style.alignItems = 'center';
    chip.style.gap = '8px';
    chip.innerHTML = `
      ${val} 
      <i class="fas fa-times" style="cursor:pointer" onclick="this.parentElement.remove(); removeTag('${val}')"></i>
    `;
    chipsContainer.appendChild(chip);
  }

  window.removeTag = function(val) {
    customInterests = customInterests.filter(i => i !== val);
    updateHidden();
  };

  function updateHidden() {
    hiddenInput.value = customInterests.join(',');
  }
});
</script>
{% endblock %}
