{% extends "base.html" %}
{% block title %}Complete Your Profile – EduRecommender{% endblock %}
{% block page_title %}Onboarding{% endblock %}

{% block content %}
<div class="container-fluid px-0 py-0">
  <div class="card border-0 shadow-none rounded-0 min-vh-100 fade-in">
        <!-- Top Column: Header -->
        <div class="card-header bg-primary text-white p-5 text-center position-relative overflow-hidden" style="background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%) !important;">
          <!-- Background subtle pattern/gradient -->
          <div class="position-absolute top-0 start-0 w-100 h-100 opacity-10" style="background-image: radial-gradient(circle, #ffffff 1px, transparent 1px); background-size: 20px 20px;"></div>
          <div class="position-relative z-1">
            <div class="mb-3">
               <i class="fas fa-user-graduate fa-3x"></i>
            </div>
            <h2 class="fw-bold fs-2">Almost There!</h2>
            <p class="mb-0 opacity-75">Tell us about your background to calibrate your AI recommendations.</p>
          </div>
        </div>
        
        <!-- Bottom Column: Form -->
        <div class="card-body p-4 p-md-5 bg-white">
          <form method="POST" id="complete-profile-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div class="row g-4 mb-4">
              <div class="col-md-6">
                <div class="form-group mb-0">
                  <label class="form-label fw-bold small text-uppercase text-muted">Primary Academic Field</label>
                  <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-university text-primary"></i></span>
                    <select id="academic_field" name="academic_field" class="form-select bg-light border-start-0" required>
                      <option value="" disabled selected>Select field...</option>
                      {% for field in fields_map.keys() %}
                      <option value="{{ field }}">{{ field }}</option>
                      {% endfor %}
                    </select>
                  </div>
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-group mb-0">
                  <label class="form-label fw-bold small text-uppercase text-muted">Department</label>
                  <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-building text-primary"></i></span>
                    <input type="text" name="department" class="form-control bg-light border-start-0" placeholder="e.g. Computer Science" required>
                  </div>
                </div>
              </div>
            </div>

            <div class="form-group mb-4">
              <label class="form-label fw-bold small text-uppercase text-muted">Current Cumulative GPA</label>
              <div class="input-group">
                <span class="input-group-text bg-light border-end-0"><i class="fas fa-chart-line text-primary"></i></span>
                <input type="number" name="gpa" class="form-control bg-light border-start-0" step="0.01" min="0" max="5.0" placeholder="e.g. 3.50 (Leave 0.0 if first year)" required>
              </div>
            </div>

            <!-- Dynamic Interests Section -->
            <div class="form-group mb-4" id="interests-section" style="display:none;">
              <label class="form-label fw-bold small text-uppercase text-muted">What are your interests in <span id="field-display" class="text-primary"></span>?</label>
              <div class="interest-grid-container p-3 border rounded-4 bg-light">
                <div id="sub-interests-grid" class="d-flex flex-wrap gap-2">
                  <!-- JS Populated -->
                </div>
              </div>
            </div>

            <!-- Hidden input to store selected interests as comma separated string -->
            <input type="hidden" name="interests" id="interests-input">

            <div class="form-group mb-4 position-relative">
              <label class="form-label fw-bold small text-uppercase text-muted">Search or Add Specific Interests</label>
              <div class="input-group">
                <span class="input-group-text bg-light border-end-0"><i class="fas fa-search text-primary"></i></span>
                <input type="text" id="custom-interest-input" class="form-control bg-light border-start-0" placeholder="Type an interest and press Enter..." autocomplete="off">
              </div>
              <!-- Autocomplete suggestions dropdown -->
              <div id="autocomplete-suggestions" class="list-group position-absolute w-100 mt-1 shadow rounded-3 border overflow-hidden d-none" style="z-index: 1050; max-height: 200px; overflow-y: auto;">
              </div>
              <div id="selected-chips-container" class="mt-3 d-flex flex-wrap gap-2">
                <!-- Selected items show here -->
              </div>
            </div>

            <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill py-3 fw-bold shadow-sm mt-4">
              Finish Setup & View Dashboard <i class="fas fa-arrow-right ms-2"></i>
            </button>
          </form>
        </div>
      </div>
    </div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const fieldSelect = document.getElementById('academic_field');
  const interestsSection = document.getElementById('interests-section');
  const subGrid = document.getElementById('sub-interests-grid');
  const fieldDisplay = document.getElementById('field-display');
  const customInput = document.getElementById('custom-interest-input');
  const chipsContainer = document.getElementById('selected-chips-container');
  const hiddenInput = document.getElementById('interests-input');
  
  let selectedInterests = [];

  // Compile all unique interests from the fields_map passed from Python
  const allInterests = [];
  {% for field, interests in fields_map.items() %}
    {% for interest in interests %}
      if (!allInterests.includes("{{ interest }}")) {
        allInterests.push("{{ interest }}");
      }
    {% endfor %}
  {% endfor %}

  const suggestionBox = document.getElementById('autocomplete-suggestions');
  let activeSuggestionIndex = -1;
  let filteredSuggestions = [];

  fieldSelect.addEventListener('change', async function() {
    const field = this.value;
    fieldDisplay.textContent = field;
    interestsSection.style.display = 'block';
    subGrid.innerHTML = '<div class="spinner-border spinner-border-sm text-primary"></div>';
    
    try {
      const resp = await fetch(`/api/sub-interests/${encodeURIComponent(field)}`);
      const data = await resp.json();
      subGrid.innerHTML = '';
      
      const subInterests = data.sub_interests || [];
      if (subInterests.length === 0) {
        subGrid.innerHTML = '<span class="text-muted small p-2">Could not load department suggestions. Search below to add your interests manually.</span>';
        return;
      }
      
      subInterests.forEach(interest => {
        const chip = document.createElement('div');
        chip.className = 'interest-pill px-3 py-2 rounded-pill border cursor-pointer transition-all small fw-medium';
        chip.textContent = interest;
        if (selectedInterests.includes(interest)) chip.classList.add('active');
        
        chip.onclick = () => toggleInterest(interest, chip);
        subGrid.appendChild(chip);
      });
    } catch (e) {
      subGrid.innerHTML = '<span class="text-danger small">Error loading interests.</span>';
    }
  });

  // Autocomplete suggestions dynamic display
  customInput.addEventListener('input', function() {
    const query = this.value.trim().toLowerCase();
    suggestionBox.innerHTML = '';
    activeSuggestionIndex = -1;
    
    if (!query) {
      suggestionBox.classList.add('d-none');
      return;
    }

    filteredSuggestions = allInterests.filter(interest => 
      interest.toLowerCase().includes(query) && !selectedInterests.includes(interest)
    ).slice(0, 8); // Top 8 suggestions

    if (filteredSuggestions.length === 0) {
      suggestionBox.classList.add('d-none');
      return;
    }

    suggestionBox.classList.remove('d-none');
    filteredSuggestions.forEach((interest, index) => {
      const item = document.createElement('button');
      item.type = 'button';
      item.className = 'list-group-item list-group-item-action border-0 px-3 py-2 text-start small d-flex align-items-center justify-content-between';
      item.innerHTML = `<span>${interest}</span> <span class="badge bg-light text-muted fw-normal">Add</span>`;
      
      item.onclick = function() {
        addInterest(interest);
        customInput.value = '';
        suggestionBox.classList.add('d-none');
        customInput.focus();
      };
      
      suggestionBox.appendChild(item);
    });
  });

  // Key navigation for search suggestions
  customInput.addEventListener('keydown', function(e) {
    const items = suggestionBox.querySelectorAll('.list-group-item');
    
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (items.length === 0) return;
      activeSuggestionIndex = (activeSuggestionIndex + 1) % items.length;
      updateActiveSuggestion(items);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (items.length === 0) return;
      activeSuggestionIndex = (activeSuggestionIndex - 1 + items.length) % items.length;
      updateActiveSuggestion(items);
    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (activeSuggestionIndex >= 0 && activeSuggestionIndex < items.length) {
        items[activeSuggestionIndex].click();
      } else {
        const val = this.value.trim();
        if (val && !selectedInterests.includes(val)) {
          addInterest(val);
          this.value = '';
          suggestionBox.classList.add('d-none');
        }
      }
    } else if (e.key === 'Escape') {
      suggestionBox.classList.add('d-none');
      activeSuggestionIndex = -1;
    }
  });

  // Hide suggestions dropdown if clicked outside
  document.addEventListener('click', function(e) {
    if (!customInput.contains(e.target) && !suggestionBox.contains(e.target)) {
      suggestionBox.classList.add('d-none');
    }
  });

  function updateActiveSuggestion(items) {
    items.forEach((item, index) => {
      if (index === activeSuggestionIndex) {
        item.classList.add('active');
        item.classList.add('bg-primary');
        item.classList.add('text-white');
        item.scrollIntoView({ block: 'nearest' });
      } else {
        item.classList.remove('active');
        item.classList.remove('bg-primary');
        item.classList.remove('text-white');
      }
    });
  }

  function toggleInterest(val, element) {
    if (selectedInterests.includes(val)) {
      selectedInterests = selectedInterests.filter(i => i !== val);
      if (element) element.classList.remove('active');
      removeChip(val);
    } else {
      selectedInterests.push(val);
      if (element) element.classList.add('active');
      addChip(val);
    }
    updateHidden();
  }

  function addInterest(val) {
    if (!selectedInterests.includes(val)) {
      selectedInterests.push(val);
      addChip(val);
      updateHidden();
    }
  }

  function addChip(val) {
    if (document.querySelector(`[data-interest="${val}"]`)) return;
    const chip = document.createElement('div');
    chip.className = 'badge bg-soft-primary text-primary border border-primary px-3 py-2 rounded-pill d-flex align-items-center gap-2';
    chip.dataset.interest = val;
    chip.innerHTML = `${val} <i class="fas fa-times cursor-pointer" onclick="removeInterest('${val}')"></i>`;
    chipsContainer.appendChild(chip);
  }

  function removeChip(val) {
    const chip = document.querySelector(`[data-interest="${val}"]`);
    if (chip) chip.remove();
  }

  window.removeInterest = function(val) {
    selectedInterests = selectedInterests.filter(i => i !== val);
    removeChip(val);
    // Also toggle grid state if exists
    const gridItem = Array.from(subGrid.children).find(c => c.textContent === val);
    if (gridItem) gridItem.classList.remove('active');
    updateHidden();
  }

  function updateHidden() {
    hiddenInput.value = selectedInterests.join(',');
  }
});
</script>

<style>
.page-content {
  padding: 0 !important;
}
.interest-pill { background: white; border-color: #dee2e6 !important; }
.interest-pill:hover { border-color: var(--primary) !important; color: var(--primary); }
.interest-pill.active { background: var(--primary); color: white; border-color: var(--primary) !important; }
.cursor-pointer { cursor: pointer; }
.bg-soft-primary { background: rgba(var(--primary-rgb), 0.1); }
#autocomplete-suggestions {
  background: white;
  border-color: #dee2e6;
  max-height: 200px;
  overflow-y: auto;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1) !important;
}
#autocomplete-suggestions .list-group-item:hover {
  background: #f8f9fa;
  cursor: pointer;
}
#autocomplete-suggestions .list-group-item.active {
  background: var(--primary) !important;
  color: white !important;
}
</style>
{% endblock %}
