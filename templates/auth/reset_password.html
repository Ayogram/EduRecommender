{% extends "base.html" %}

{% block title %}Reset Password - EduRecommender{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card animate-fade-in">
        <div class="auth-header">
            <h2>Create New Password</h2>
            <p>Please enter your new password below.</p>
        </div>

        <form method="POST" class="auth-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div class="form-group">
                <label for="password">New Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" name="password" class="form-control has-toggle" placeholder="••••••••" required>
                    <button type="button" class="password-toggle-btn" tabindex="-1" aria-label="Toggle password visibility">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm New Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-shield-alt"></i>
                    <input type="password" id="confirm_password" name="confirm_password" class="form-control has-toggle" placeholder="••••••••" required>
                    <button type="button" class="password-toggle-btn" tabindex="-1" aria-label="Toggle password visibility">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-block">
                <span>Update Password</span>
                <i class="fas fa-check-circle"></i>
            </button>
        </form>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('.password-toggle-btn').forEach(btn => {
    btn.addEventListener('click', function(e) {
      e.preventDefault();
      const input = this.parentElement.querySelector('input');
      const icon = this.querySelector('i');
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
      }
    });
  });
});
</script>
{% endblock %}
